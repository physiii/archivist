version: '3.8'

services:
  # Vector store API service
  vectorstore:
    container_name: vectorstore_app
    build: .
    ports:
      - "5050:5050"
    networks:
      - vectorstore
    environment:
      # Point to Milvus service within the docker network
      MILVUS_HOST: milvus
      # Keep embedding host pointing to host machine for now
      EMBEDDING_HOST: host.docker.internal
    # Add host.docker.internal to the container's network configuration
    # Required for EMBEDDING_HOST if it's running on the host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - milvus

  # Milvus
  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.3.3
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus-data:/var/lib/milvus # Use named volume
    ports:
      - "19530:19530"
      - "9091:9091"
    networks:
      - vectorstore
    depends_on:
      - etcd
      - minio

  # Etcd
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd-data:/etcd # Use named volume
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - vectorstore

  # MinIO
  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ROOT_USER: minioadmin # Use MINIO_ROOT_USER
      MINIO_ROOT_PASSWORD: minioadmin # Use MINIO_ROOT_PASSWORD
    volumes:
      - minio-data:/minio_data # Use named volume
    command: minio server /minio_data --console-address ":9001"
    ports:
        - "9000:9000"
        - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://minio:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - vectorstore

  # Create buckets (runs once)
  createbuckets:
    image: minio/mc
    networks:
      - vectorstore
    depends_on:
      minio: # Wait for minio healthcheck
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/milvus-bucket --ignore-existing;
      exit 0;
      "

volumes:
  milvus-data:
  etcd-data:
  minio-data:

networks:
  vectorstore:
    driver: bridge 