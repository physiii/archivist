services:
  # Vector store API service
  vectorstore:
    container_name: vectorstore_app
    build: .
    ports:
      - "5050:5050"
    volumes:
      - vectorstore-backups:/backups
      - milvus-data:/data/milvus:ro
      - etcd-data:/data/etcd:ro
      - minio-data:/data/minio:ro
      # Host mounts for Custodian parity diagnostics/config.
      - /home/andy/custodian:/host/custodian:ro
      - /media/mass:/mass:ro
      - /home/andy/nas_mass:/home/andy/nas_mass
    networks:
      - vectorstore
    environment:
      MILVUS_HOST: milvus
      EMBEDDING_HOST: host.docker.internal
      CUSTODIAN_CONFIG_PATH: /host/custodian/config.py
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - milvus
    restart: always  # Added here for this service

  # Milvus
  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.7
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus-data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    networks:
      - vectorstore
    depends_on:
      - etcd
      - minio
    restart: always  # Added here for this service

  # Etcd
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - vectorstore
    restart: always  # Added here for this service

  # MinIO
  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://minio:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - vectorstore
    restart: always  # Added here for this service

  # Create buckets (runs once)
  createbuckets:
    image: minio/mc
    networks:
      - vectorstore
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/milvus-bucket --ignore-existing;
      exit 0;
      "
    restart: "no"

volumes:
  milvus-data:
  etcd-data:
  minio-data:
  vectorstore-backups:
networks:
  vectorstore:
    driver: bridge
